{% extends 'base.html' %}

{% block content %}

<h1 class="text-3xl font-bold text-slate-900">Edit Buku</h1>
<p class="text-gray-600">Halaman edit buku - Perpustakaan Sekolah</p>

<form method="post" class="space-y-5">
    {% csrf_token %}

<div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Judul</label>
    <input type="text" name="judul" value="{{ buku.judul }}" required
           class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm">
</div>

<div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
    <input type="text" name="kategori" value="{{ buku.kategori }}" required
           class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm">
</div>

<div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Pengarang</label>
    <input type="text" name="pengarang" value="{{ buku.pengarang }}" required
           class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm">
</div>

<div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Penerbit</label>
    <input type="text" name="penerbit" value="{{ buku.penerbit }}" required
           class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm">
</div>

<div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Tahun Terbit</label>
    <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required
           class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm">
</div>

<div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Rak</label>
    <input type="text" name="rak" value="{{ buku.rak }}" required
           class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm">
</div>

<div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Stok</label>
    <input type="number" name="stok" value="{{ buku.stok }}" required
           class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm">
</div>

<div class="flex gap-3 pt-2">
    <button type="submit"
            class="px-4 py-2 bg-yellow-500 text-white rounded-lg text-sm font-medium hover:bg-yellow-600">
        Update
    </button>

    <a href="{% url 'daftar_buku' %}"
       class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
        Batal
    </a>
</div>


</form>
{% endblock %}

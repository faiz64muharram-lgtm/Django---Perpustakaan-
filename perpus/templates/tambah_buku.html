{% extends 'base.html' %}


{% block content %}
<h1 class="text-3xl font-bold text-slate-900">Tambah Buku</h1>
<p class="text-gray-600">Halaman tambah buku kelas X - HSI Boarding School Purworejo</p>
<form method="post" class="space-y-5">
    <!-- token keamanan anti-CSRF -->
    {% csrf_token %}

    <!-- form inputannya disini ntar -->
     
<div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Judul</label>
        <input type="text" name="judul" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
        <input type="text" name="kategori" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Pengarang</label>
        <input type="text" name="pengarang" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <p class="block text-sm font-medium text-slate-700 mb-1">Penerbit</p>
        <input type="text" name="penerbit" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Tahun Terbit</label>
        <input type="number" name="tahun_terbit" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Rak</label>
        <input type="text" name="rak" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
        

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Stok</label>
        <input type="number" name="stok" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>


    <div class="flex gap-3 pt-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
            Simpan
        </button>

        <a href="{% url 'perpus_list' %}"
           class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
            Batal
        </a>
    </div>



    
    
</form>
{% endblock %}

{% extends 'base.html' %} {% block content %}

<div class="mb-6">
  <p class="text-gray-500">Peminjaman Buku</p>
  <h1 class="text-3xl font-bold text-slate-900">Pinjam Buku</h1>
</div>

<form method="post" class="bg-white p-6 rounded-3xl shadow-sm">
  {% csrf_token %}

  <div class="grid md:grid-cols-2 gap-6">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"> Nama Peminjam </label>

      <select name="siswa_id" required class="w-full px-4 py-3 border border-slate-300 rounded-xl">
        <option value="">-- Pilih Siswa --</option>

        {% for siswa in siswa_list %}
        <option value="{{ siswa.id }}">{{ siswa.nama }} - {{ siswa.kelas }} ({{ siswa.nis }})</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"> Pilih Buku </label>

      <select name="buku_id" required class="w-full px-4 py-3 border border-slate-300 rounded-xl">
        <option value="">-- Pilih Buku --</option>

        {% for buku in buku_list %}
        <option value="{{ buku.id }}">{{ buku.judul }} ({{ buku.stok }} stok)</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"> Tanggal Pinjam </label>
      <input type="date" name="tanggal_pinjam" required class="w-full px-4 py-3 border border-slate-300 rounded-xl" />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"> Tanggal Jatuh Tempo </label>
      <input type="date" name="jatuh_tempo" required class="w-full px-4 py-3 border border-slate-300 rounded-xl" />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"> Keperluan </label>
      <select name="keperluan" class="w-full px-4 py-3 border border-slate-300 rounded-xl">
        <option value="Tugas Sekolah">Tugas Sekolah</option>
        <option value="Bacaan Pribadi">Bacaan Pribadi</option>
        <option value="Penelitian">Penelitian</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-2"> Petugas </label>
      <input type="text" name="petugas" required class="w-full px-4 py-3 border border-slate-300 rounded-xl" />
    </div>
  </div>

  <div class="mt-6">
    <label class="block text-sm font-medium text-slate-700 mb-2"> Catatan </label>

    <textarea
      name="catatan"
      rows="4"
      class="w-full px-4 py-3 border border-slate-300 rounded-xl"
      placeholder="Contoh: buku untuk tugas Bahasa Indonesia"
    ></textarea>
  </div>

  <div class="border-t mt-6 pt-6 flex justify-end gap-3">
    <a href="{% url 'daftar_peminjaman' %}" class="px-5 py-3 border border-slate-300 rounded-xl hover:bg-slate-100">
      Batal
    </a>

    <button type="submit" class="px-5 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700">Pinjam Buku</button>
  </div>
</form>

{% endblock %}

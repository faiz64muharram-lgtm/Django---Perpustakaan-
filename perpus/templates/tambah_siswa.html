{% extends 'base.html' %}


{% block content %}
<h1 class="text-3xl font-bold text-slate-900">Tambah Siswa</h1>
<p class="text-gray-600">Halaman tambah siswa kelas X - HSI Boarding School Purworejo</p>
<form method="post" class="space-y-5">
    <!-- token keamanan anti-CSRF -->
    {% csrf_token %}

    <!-- form inputannya disini ntar -->
     
<div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nama</label>
        <input type="text" name="nama" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
    

    <label class="block text-sm font-medium text-slate-700 mb-2">
    Kelas
</label>

<input
    type="text"
    name="kelas"
    list="daftar-kelas"
    required
    placeholder="Contoh: X RPL 1"
    class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">

<datalist id="daftar-kelas">
    {% for kelas in kelas_list %}
        <option value="{{ kelas.kelas }}">
    {% endfor %}
</datalist>
</div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">NIS</label>
        <input type="number" name="nis" value="" required
               class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>


    <div class="flex gap-3 pt-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
            Simpan
        </button>

        <a href="{% url 'daftar_siswa' %}"
           class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200">
            Batal
        </a>
    </div>



    
    
</form>
{% endblock %}
